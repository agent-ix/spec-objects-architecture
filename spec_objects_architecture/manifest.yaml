manifest_version: 1.0.0
name: spec-objects-architecture
version: 0.2.0
description: 'Filament Module: tier-2 architecture ObjectTypes (api_endpoint, data_schema, queue, action, ui_component, rate_limit, interface, external_contract, extension_point, binary_format)'
nav:
  category:
    slug: architecture
    label: Architecture
    icon: Network
    order: 52
archetypes: []
grammars: []
artifact_types: []
lint_rules: []
object_types:
- name: api_endpoint
  roles: [externally-exposed, deployable, measurable, configurable]
  allowed_links:
    exposes: [domain-object]
    operates_on: [domain-object]
    reads: [data_schema, aggregate_root, entity]
    writes: [data_schema, aggregate_root, entity]
    calls: [api_endpoint, external_contract]
    publishes: [queue]
    implements: [interface]
    requires: [permission, auth_flow]
    realizes: [business-intent]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: &id001
          from: frontmatter_field
          path:
          - id
          required: true
        title: &id002
          from: frontmatter_field
          path:
          - title
          required: true
        type: &id003
          from: frontmatter_field
          path:
          - type
          required: true
        # Format-walkthrough decision #20 (2026-06-11): `routes` dropped —
        # `Endpoint` is the sole canonical anchor (~80/90 FRs in the wild;
        # zero files carried both). Multi-route surfaces list routes
        # inside the one Endpoint section.
        endpoint:
          from: section_body
          after_heading: Endpoint
          required: true
        api_contract:
          from: section_body
          after_heading: 2. API Contract
          required: false
- name: data_schema
  allowed_links:
    contains: [data_schema, enumeration]
    represents: [domain-object]
    references: [data_schema]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        schema_json:
          from: code_block
          after_heading: Schema
          required: true
          language: json
- name: queue
  roles: [externally-exposed, deployable, configurable]
  allowed_links:
    carries: [data_schema, event]
    references: [data_schema]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        message_schema:
          from: code_block
          after_heading: Message Format
          required: true
          language: json
- name: action
  roles: [externally-exposed]
  allowed_links:
    triggers: [process, action]
    reads: [data_schema]
    writes: [data_schema]
    calls: [api_endpoint]
    operates_on: [domain-object]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        inputs:
          from: section_body
          after_heading: Inputs
          required: true
- name: ui_component
  roles: [externally-exposed, deployable]
  allowed_links:
    contains: [ui_component]
    contained_by: [ui_component]
    calls: [api_endpoint, action]
    renders: [data_schema]
    realizes: [business-intent]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        props:
          from: section_body
          after_heading: Props
          required: true
# `integration` object type RETIRED (format-walkthrough decision #8,
# 2026-06-11): the tag `tags: [integration]` is the working discovery
# surface (IntegrationTab); the object type's anchors never matched its
# 9 users. Internal contracts -> `interface`; external-system contracts
# -> `external_contract`; service-client FRs -> relationship edges.
- name: interface
  roles: [externally-exposed]
  allowed_links:
    contains: [api_endpoint]
    references: [data_schema]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        # Language-neutral operations contract (trait / TS interface /
        # ABC / hexagonal port). YAML, not source code — specs are
        # human-readable design (decision #7). Implementations are NOT
        # enumerated here: each implementation FR links via an
        # `implements` edge.
        contract_yaml:
          from: code_block
          after_heading: Contract
          language: yaml
          required: true
- name: external_contract
  roles: [externally-exposed]
  allowed_links:
    implements: [interface]
    conforms_to: [external_contract]
    references: [data_schema]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        # Contract with an EXTERNAL system (the concept `integration`
        # squatted on). Boundary vs `interface`: interface = contracts
        # within the system; external_contract = contracts with systems
        # outside it.
        contract:
          from: section_body
          after_heading: Contract
          required: true
        endpoints:
          from: section_body
          after_heading: Endpoints
          required: false
        behavior:
          from: section_body
          after_heading: Behavior
          required: false
- name: extension_point
  allowed_links:
    extends: [interface]
    references: [interface]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        # Pluggability as a first-class node: names the interface it
        # exposes plus registration/stability guarantees.
        contract:
          from: section_body
          after_heading: Contract
          required: true
        registration:
          from: section_body
          after_heading: Registration
          required: false
        stability:
          from: section_body
          after_heading: Stability
          required: false
- name: binary_format
  allowed_links:
    serializes: [data_schema]
    references: [data_schema]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        # Persisted binary layout (decision #11): YAML vocabulary for
        # what JSON Schema cannot express — record types with per-field
        # name/offset/size/type/endianness. `data_schema` stays for
        # genuinely JSON-shaped data.
        layout_yaml:
          from: code_block
          after_heading: Layout
          language: yaml
          required: true
- name: rate_limit
  allowed_links:
    throttles: [api_endpoint, action]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        thresholds:
          from: section_body
          after_heading: Thresholds
          required: true
