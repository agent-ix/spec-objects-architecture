manifest_version: 1.0.0
name: spec-objects-architecture
version: 0.2.0
description: 'Filament Module: tier-2 architecture ObjectTypes (api_endpoint, data_schema, queue, action, ui_component, rate_limit, interface, external_contract, extension_point, binary_format)'
nav:
  category:
    slug: architecture
    label: Architecture
    icon: Network
    order: 52
archetypes: []
grammars: []
artifact_types: []
lint_rules: []
object_types:
- name: api_endpoint
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: &id001
          from: frontmatter_field
          path:
          - id
          required: true
        title: &id002
          from: frontmatter_field
          path:
          - title
          required: true
        artifact_type: &id003
          from: frontmatter_field
          path:
          - artifact_type
          required: true
        # Format-walkthrough decision #20 (2026-06-11): `routes` dropped —
        # `Endpoint` is the sole canonical anchor (~80/90 FRs in the wild;
        # zero files carried both). Multi-route surfaces list routes
        # inside the one Endpoint section.
        endpoint:
          from: section_body
          after_heading: Endpoint
          required: true
        api_contract:
          from: section_body
          after_heading: 2. API Contract
          required: false
- name: data_schema
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        schema_json:
          from: code_block
          after_heading: Schema
          required: true
          language: json
- name: queue
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        message_schema:
          from: code_block
          after_heading: Message Format
          required: true
          language: json
- name: action
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        inputs:
          from: section_body
          after_heading: Inputs
          required: true
- name: ui_component
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        props:
          from: section_body
          after_heading: Props
          required: true
# `integration` object type RETIRED (format-walkthrough decision #8,
# 2026-06-11): the tag `tags: [integration]` is the working discovery
# surface (IntegrationTab); the object type's anchors never matched its
# 9 users. Internal contracts -> `interface`; external-system contracts
# -> `external_contract`; service-client FRs -> relationship edges.
- name: interface
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        # Language-neutral operations contract (trait / TS interface /
        # ABC / hexagonal port). YAML, not source code — specs are
        # human-readable design (decision #7). Implementations are NOT
        # enumerated here: each implementation FR links via an
        # `implements` edge.
        contract_yaml:
          from: code_block
          after_heading: Contract
          language: yaml
          required: true
- name: external_contract
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        # Contract with an EXTERNAL system (the concept `integration`
        # squatted on). Boundary vs `interface`: interface = contracts
        # within the system; external_contract = contracts with systems
        # outside it.
        contract:
          from: section_body
          after_heading: Contract
          required: true
        endpoints:
          from: section_body
          after_heading: Endpoints
          required: false
        behavior:
          from: section_body
          after_heading: Behavior
          required: false
- name: extension_point
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        # Pluggability as a first-class node: names the interface it
        # exposes plus registration/stability guarantees.
        contract:
          from: section_body
          after_heading: Contract
          required: true
        registration:
          from: section_body
          after_heading: Registration
          required: false
        stability:
          from: section_body
          after_heading: Stability
          required: false
- name: binary_format
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        # Persisted binary layout (decision #11): YAML vocabulary for
        # what JSON Schema cannot express — record types with per-field
        # name/offset/size/type/endianness. `data_schema` stays for
        # genuinely JSON-shaped data.
        layout_yaml:
          from: code_block
          after_heading: Layout
          language: yaml
          required: true
- name: rate_limit
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        thresholds:
          from: section_body
          after_heading: Thresholds
          required: true
